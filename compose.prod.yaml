services:
  backend:
    image: ${REGISTRY}/${IMAGE_NAME}:latest
    working_dir: /App
    ports:
      - "8080"
    command: dotnet watch run --non-interactive --urls=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=database;Database=thiskord;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
    depends_on:
      database.configurator:
        condition: service_completed_successfully
    networks:
      - backend_network
  
  gateway:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - backend_network
  
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
    volumes:
      - database_data:/var/opt/mssql
    ports:
      - "1533:1433"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD}' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s
      timeout: 3s


  database.configurator:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./Thiskord_db.sql:/init.sql
    networks:
      - backend_network
    command: >
      bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S database -U sa -P ${DB_PASSWORD} -C -i /init.sql
      "
      
volumes:
  database_data:
  caddy_data:
  caddy_config:

networks:
  backend_network:
    driver: bridge