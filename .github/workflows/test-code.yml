name: Testing code

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  builds:
    runs-on: ubuntu-latest

    env:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    services:
      database:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-retries 10
          --health-start-period 30s
          --health-timeout 3s

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
      - name: Restore dependencies
        run: dotnet restore

      - name: Build the project
        run: dotnet build --no-restore --configuration Release

      - name: Test
        env:
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=thiskord;User Id=sa;Password=${{ secrets.DB_PASSWORD }};TrustServerCertificate=True;"
        run: dotnet test --no-build --configuration Release
